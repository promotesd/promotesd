<svg width="960" height="420" viewBox="0 0 960 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated elemental cat</title>
  <desc id="desc">A cute animated cat surrounded by fire, water, wind, and earth elemental effects.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(478 198) rotate(90) scale(283 605)">
      <stop stop-color="#581C87"/>
      <stop offset="0.46" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="fur" x1="373" y1="114" x2="588" y2="337" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDF2F8"/>
      <stop offset="0.48" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="fire" x1="281" y1="138" x2="322" y2="239" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="0.46" stop-color="#F97316"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
    <linearGradient id="water" x1="631" y1="123" x2="684" y2="239" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="0.46" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="earth" x1="613" y1="285" x2="697" y2="359" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BBF7D0"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .orb { animation: orbit 8s linear infinite; transform-origin: 480px 216px; }
      .orb.two { animation-delay: -2s; }
      .orb.three { animation-delay: -4s; }
      .orb.four { animation-delay: -6s; }
      .cat { animation: breathe 3s ease-in-out infinite; transform-origin: 480px 259px; }
      .tail { animation: tailWave 2.8s ease-in-out infinite; transform-origin: 555px 272px; }
      .ear-left { animation: earTwitch 4s ease-in-out infinite; transform-origin: 409px 133px; }
      .ear-right { animation: earTwitch 4s ease-in-out infinite reverse; transform-origin: 551px 133px; }
      .blink { animation: blink 4.6s ease-in-out infinite; transform-origin: center; }
      .flame { animation: flicker 1.25s ease-in-out infinite; transform-origin: 304px 206px; }
      .drop { animation: bob 2s ease-in-out infinite; transform-origin: center; }
      .leaf { animation: leafSpin 5s ease-in-out infinite; transform-origin: 657px 322px; }
      .wind { animation: windFlow 3.2s ease-in-out infinite; stroke-dasharray: 54 24; }
      .star { animation: sparkle 2.4s ease-in-out infinite; transform-origin: center; }
      .star.b { animation-delay: .8s; }
      .star.c { animation-delay: 1.6s; }
      @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-7px) scale(1.018); } }
      @keyframes tailWave { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(14deg); } }
      @keyframes earTwitch { 0%, 72%, 100% { transform: rotate(0deg); } 78% { transform: rotate(-8deg); } 84% { transform: rotate(4deg); } }
      @keyframes blink { 0%, 92%, 100% { transform: scaleY(1); } 95% { transform: scaleY(.08); } }
      @keyframes flicker { 0%, 100% { transform: scale(1) rotate(-2deg); opacity: .92; } 50% { transform: scale(1.12) rotate(5deg); opacity: 1; } }
      @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-13px); } }
      @keyframes leafSpin { 0%, 100% { transform: rotate(-7deg) translateY(0); } 50% { transform: rotate(12deg) translateY(-10px); } }
      @keyframes windFlow { 0% { stroke-dashoffset: 0; opacity: .45; } 50% { opacity: .95; } 100% { stroke-dashoffset: -78; opacity: .45; } }
      @keyframes sparkle { 0%, 100% { opacity: .22; transform: scale(.75) rotate(0deg); } 50% { opacity: 1; transform: scale(1.18) rotate(18deg); } }
      @media (prefers-reduced-motion: reduce) {
        .orb, .cat, .tail, .ear-left, .ear-right, .blink, .flame, .drop, .leaf, .wind, .star { animation: none; }
      }
    </style>
  </defs>

  <rect width="960" height="420" rx="28" fill="url(#bgGlow)"/>
  <circle cx="480" cy="215" r="150" stroke="#A855F7" stroke-opacity=".2" stroke-width="2"/>
  <circle cx="480" cy="215" r="112" stroke="#38BDF8" stroke-opacity=".16" stroke-width="2"/>
  <path class="wind" d="M184 147C246 109 316 109 376 143" stroke="#E0E7FF" stroke-width="8" stroke-linecap="round"/>
  <path class="wind" d="M600 110C672 75 758 91 808 143" stroke="#C4B5FD" stroke-width="8" stroke-linecap="round"/>
  <path class="wind" d="M159 294C239 337 324 328 394 281" stroke="#BAE6FD" stroke-width="7" stroke-linecap="round"/>

  <g class="orb" filter="url(#glow)"><circle cx="480" cy="70" r="10" fill="#FDE68A"/></g>
  <g class="orb two" filter="url(#glow)"><circle cx="480" cy="70" r="10" fill="#38BDF8"/></g>
  <g class="orb three" filter="url(#glow)"><circle cx="480" cy="70" r="10" fill="#22C55E"/></g>
  <g class="orb four" filter="url(#glow)"><circle cx="480" cy="70" r="10" fill="#F472B6"/></g>

  <g class="flame" filter="url(#glow)">
    <path d="M302 124C333 163 329 194 304 222C275 196 270 164 302 124Z" fill="url(#fire)"/>
    <path d="M305 164C319 184 316 201 303 215C289 200 291 183 305 164Z" fill="#FEF3C7"/>
  </g>
  <g class="drop" filter="url(#glow)">
    <path d="M668 124C703 170 701 212 667 237C632 212 631 170 668 124Z" fill="url(#water)"/>
    <path d="M653 188C654 206 664 217 681 220" stroke="#E0F2FE" stroke-width="7" stroke-linecap="round" opacity=".8"/>
  </g>
  <g class="leaf" filter="url(#glow)">
    <path d="M649 286C694 286 720 315 719 353C672 357 643 329 649 286Z" fill="url(#earth)"/>
    <path d="M660 298C676 317 691 332 711 346" stroke="#DCFCE7" stroke-width="5" stroke-linecap="round" opacity=".75"/>
  </g>

  <g class="cat" filter="url(#shadow)">
    <path class="tail" d="M565 280C639 255 675 295 649 327C626 356 581 332 611 306" stroke="#A78BFA" stroke-width="34" stroke-linecap="round"/>
    <ellipse cx="480" cy="271" rx="109" ry="89" fill="url(#fur)"/>
    <path class="ear-left" d="M381 151L414 78L459 160C436 149 410 146 381 151Z" fill="#C4B5FD"/>
    <path class="ear-right" d="M501 160L546 78L580 151C552 146 524 149 501 160Z" fill="#C4B5FD"/>
    <path d="M404 139L416 111L432 145C422 140 413 138 404 139Z" fill="#FBCFE8" opacity=".9"/>
    <path d="M528 145L544 111L556 139C547 138 538 140 528 145Z" fill="#FBCFE8" opacity=".9"/>
    <circle cx="480" cy="188" r="79" fill="url(#fur)"/>
    <ellipse class="blink" cx="446" cy="184" rx="12" ry="17" fill="#111827"/>
    <ellipse class="blink" cx="514" cy="184" rx="12" ry="17" fill="#111827"/>
    <circle cx="451" cy="177" r="4" fill="#F8FAFC"/>
    <circle cx="519" cy="177" r="4" fill="#F8FAFC"/>
    <path d="M480 201L468 216H492L480 201Z" fill="#EC4899"/>
    <path d="M480 215C472 228 459 231 448 222" stroke="#581C87" stroke-width="4" stroke-linecap="round"/>
    <path d="M480 215C488 228 501 231 512 222" stroke="#581C87" stroke-width="4" stroke-linecap="round"/>
    <path d="M420 208C386 197 357 199 329 209" stroke="#E9D5FF" stroke-width="5" stroke-linecap="round"/>
    <path d="M421 225C386 228 362 239 338 254" stroke="#E9D5FF" stroke-width="5" stroke-linecap="round"/>
    <path d="M540 208C574 197 603 199 631 209" stroke="#E9D5FF" stroke-width="5" stroke-linecap="round"/>
    <path d="M539 225C574 228 598 239 622 254" stroke="#E9D5FF" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="413" cy="213" rx="14" ry="9" fill="#F9A8D4" opacity=".45"/>
    <ellipse cx="547" cy="213" rx="14" ry="9" fill="#F9A8D4" opacity=".45"/>
    <path d="M405 341C421 357 448 357 461 338" stroke="#E9D5FF" stroke-width="22" stroke-linecap="round"/>
    <path d="M499 338C514 357 541 357 556 341" stroke="#E9D5FF" stroke-width="22" stroke-linecap="round"/>
  </g>

  <path class="star" d="M226 215L233 231L250 238L233 245L226 261L219 245L202 238L219 231L226 215Z" fill="#FDE68A"/>
  <path class="star b" d="M764 226L771 242L788 249L771 256L764 272L757 256L740 249L757 242L764 226Z" fill="#BAE6FD"/>
  <path class="star c" d="M790 87L796 100L810 106L796 112L790 126L784 112L770 106L784 100L790 87Z" fill="#F5D0FE"/>
</svg>
