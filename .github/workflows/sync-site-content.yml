name: Sync blog and diary

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-site-content
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Update README sections
        run: python3 scripts/update_site_content.py

      - name: Commit changed content
        run: |
          if git diff --quiet -- README.md; then
            echo "README is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync blog and diary"
          git push
