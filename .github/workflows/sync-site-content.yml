name: Sync blog and diary

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-site-content.yml"

permissions:
  contents: write

concurrency:
  group: sync-site-content
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Update latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.xiaodudu.top/rss.xml"
          max_post_count: 5
          commit_message: "chore: sync latest blog posts"
          enable_keepalive: false

      - name: Update latest diary entries
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "DIARY-POST-LIST"
          feed_list: "https://www.xiaodudu.top/diary-rss.xml"
          max_post_count: 5
          commit_message: "chore: sync latest diary entries"
          enable_keepalive: false
